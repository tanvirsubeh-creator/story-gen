<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Generator</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;padding:40px;">

    <h1>🔥 Viral Story Generator</h1>

    <button id="genBtn" onclick="generateScript()">Generate Story</button>
    <p id="status">Idle</p>

    <h2 id="title"></h2>
    <p id="views"></p>
    <p id="body"></p>

<script>
async function generateScript() {
    const genBtn = document.getElementById('genBtn');
    genBtn.disabled = true;
    document.getElementById('status').innerText = 'Claude is writing...';

    const prompt = `
Return ONLY valid JSON.

{
  "title": "...",
  "body": "...",
  "views": "..."
}

Make it a viral TikTok story. Body must be 300+ words.
`;

    try {
        const res = await fetch("/.netlify/functions/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        const contentText = data.content[0].text;
        const parsed = JSON.parse(contentText);

        document.getElementById('title').innerText = parsed.title;
        document.getElementById('views').innerText = "👁 " + parsed.views;
        document.getElementById('body').innerText = parsed.body;

        document.getElementById('status').innerText = 'Ready!';
    } catch (err) {
        console.error(err);
        document.getElementById('status').innerText = 'Error (check console)';
    }

    genBtn.disabled = false;
}
</script>

</body>
</html>
