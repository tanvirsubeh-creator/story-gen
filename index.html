<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viral Story Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f0f0f8;
      --muted: #6b6b8a;
      --success: #10b981;
      --error: #ef4444;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,58,237,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent2); }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .genre-badge {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .genre-badge.visible { display: flex; }

    .genre-pill {
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--accent2);
      font-weight: 700;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9333ea);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(124,58,237,0.4);
    }

    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      margin-top: 12px;
      display: none;
    }

    .btn-secondary:hover { background: rgba(6,182,212,0.1); }

    .status-area { margin-top: 24px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.active { background: var(--accent2); animation: pulse 1.5s ease-in-out infinite; }
    .dot.success { background: var(--success); }
    .dot.error { background: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .steps { display: none; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .steps.visible { display: flex; }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      transition: color 0.3s;
      padding: 6px 0;
    }

    .step.active { color: var(--text); }
    .step.done { color: var(--success); }
    .step.failed { color: var(--error); }
    .step-icon { font-size: 14px; width: 18px; text-align: center; }

    /* Story preview card */
    .story-preview {
      display: none;
      background: rgba(124,58,237,0.06);
      border: 1px solid rgba(124,58,237,0.15);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .story-preview.visible { display: block; }

    .story-preview-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .story-preview-heading {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .story-preview-script {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      line-height: 1.7;
    }

    .error-box {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--error);
      line-height: 1.5;
      word-break: break-word;
    }

    .error-box.visible { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🎬</div>
        <div class="logo-text">Story<span>Gen</span></div>
      </div>
      <p class="tagline">AI-generated viral short story videos.<br>New genre. New story. Every time.</p>

      <div class="genre-badge" id="genreBadge">
        Genre: <span class="genre-pill" id="genreLabel">—</span>
      </div>

      <button class="btn btn-primary" id="genBtn" onclick="generateStory()">
        ✦ GENERATE VIDEO
      </button>
      <button class="btn btn-secondary" id="exportBtn" onclick="downloadVideo()">
        ↓ DOWNLOAD VIDEO
      </button>

      <div class="status-area">
        <div class="status-row">
          <div class="dot" id="statusDot"></div>
          <span id="statusText">Ready</span>
        </div>

        <div class="steps" id="steps">
          <div class="step" id="step1"><span class="step-icon">✍️</span> Writing story with Claude...</div>
          <div class="step" id="step2"><span class="step-icon">🎙️</span> Generating voiceover with ElevenLabs...</div>
          <div class="step" id="step3"><span class="step-icon">☁️</span> Uploading audio to Cloudinary...</div>
          <div class="step" id="step4"><span class="step-icon">🎬</span> Rendering video with Shotstack...</div>
          <div class="step" id="step5"><span class="step-icon">✅</span> Done!</div>
        </div>

        <div class="story-preview" id="storyPreview">
          <div class="story-preview-title">Generated Story</div>
          <div class="story-preview-heading" id="previewTitle"></div>
          <div class="story-preview-script" id="previewScript"></div>
        </div>

        <div class="error-box" id="errorBox"></div>
      </div>
    </div>
  </div>

  <script>
    let videoUrl = null;

    function setStep(id, state, icon) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'step ' + state;
      if (icon) el.querySelector('.step-icon').textContent = icon;
    }

    function showError(msg) {
      document.getElementById('statusDot').className = 'dot error';
      document.getElementById('statusText').textContent = 'Error';
      const box = document.getElementById('errorBox');
      box.textContent = '⚠ ' + msg;
      box.classList.add('visible');
      document.getElementById('genBtn').disabled = false;
    }

    async function generateStory() {
      const genBtn = document.getElementById('genBtn');
      const exportBtn = document.getElementById('exportBtn');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const steps = document.getElementById('steps');
      const errorBox = document.getElementById('errorBox');
      const storyPreview = document.getElementById('storyPreview');
      const genreBadge = document.getElementById('genreBadge');

      // Reset
      genBtn.disabled = true;
      exportBtn.style.display = 'none';
      errorBox.classList.remove('visible');
      storyPreview.classList.remove('visible');
      genreBadge.classList.remove('visible');
      steps.classList.add('visible');
      statusDot.className = 'dot active';
      videoUrl = null;

      ['step1','step2','step3','step4','step5'].forEach(s => setStep(s, ''));

      setStep('step1', 'active');
      statusText.textContent = 'Writing story...';

      try {
        const res = await fetch('/.netlify/functions/generate', { method: 'POST' });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
        if (!data.renderId) throw new Error('No render ID returned');

        // Show story details
        if (data.title) {
          document.getElementById('previewTitle').textContent = data.title;
          document.getElementById('previewScript').textContent = data.script || '';
          storyPreview.classList.add('visible');
        }

        if (data.genre) {
          document.getElementById('genreLabel').textContent = data.genre.toUpperCase();
          genreBadge.classList.add('visible');
        }

        setStep('step1', 'done', '✍️');
        setStep('step2', 'done', '🎙️');
        setStep('step3', 'done', '☁️');
        setStep('step4', 'active');
        statusText.textContent = 'Rendering video...';

        await pollStatus(data.renderId);

      } catch (e) {
        showError(e.message);
      }
    }

    async function pollStatus(id) {
      const maxAttempts = 72; // 6 minutes max (every 5s)
      let attempts = 0;

      return new Promise((resolve, reject) => {
        const interval = setInterval(async () => {
          attempts++;

          if (attempts > maxAttempts) {
            clearInterval(interval);
            showError('Render timed out after 6 minutes.');
            reject(new Error('timeout'));
            return;
          }

          try {
            const res = await fetch(`/.netlify/functions/poll?id=${id}`);
            const data = await res.json();

            if (!res.ok) throw new Error(data.error || `Poll error ${res.status}`);

            document.getElementById('statusText').textContent = `Rendering... (${data.status})`;

            if (data.status === 'done') {
              clearInterval(interval);
              videoUrl = data.url;

              setStep('step4', 'done', '🎬');
              setStep('step5', 'done', '✅');

              document.getElementById('statusDot').className = 'dot success';
              document.getElementById('statusText').textContent = '✓ Video ready!';
              document.getElementById('previewScript').textContent =
                document.getElementById('previewScript').textContent + '\n\n▶ Video is ready to download!';
              document.getElementById('exportBtn').style.display = 'block';
              document.getElementById('genBtn').disabled = false;
              resolve();

            } else if (data.status === 'failed') {
              clearInterval(interval);
              showError('Shotstack render failed. Check your Shotstack dashboard for details.');
              reject(new Error('render failed'));
            }

          } catch (e) {
            clearInterval(interval);
            showError(e.message);
            reject(e);
          }
        }, 5000);
      });
    }

    function downloadVideo() {
      if (videoUrl) window.open(videoUrl, '_blank');
    }
  </script>
</body>
</html>
