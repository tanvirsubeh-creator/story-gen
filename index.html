<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Viral Story Generator</title>
  <style>
    body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 50px; }
    .container { max-width: 500px; margin: auto; background: #222; padding: 20px; border-radius: 15px; }
    button { padding: 10px 20px; cursor: pointer; background: #0062ff; color: white; border: none; border-radius: 5px; width: 100%; margin-top: 10px; }
    #status { color: #aaa; margin-top: 10px; }
    #exportBtn { background: #00c853; display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎭 Story Gen</h1>
  <button id="genBtn" onclick="generateStory()">GENERATE VIDEO</button>
  <p id="status">Ready</p>
  <button id="exportBtn" onclick="downloadVideo()">⬇ DOWNLOAD VIDEO</button>
</div>

<script>
  let videoUrl = null;

  async function generateStory() {
    const status = document.getElementById('status');
    const genBtn = document.getElementById('genBtn');
    genBtn.disabled = true;
    status.innerText = "Generating story & video...";

    try {
      const res = await fetch('/functions/generate', { method: 'POST' });
      const data = await res.json();
      
      if (data.renderId) {
        pollStatus(data.renderId);
      } else {
        status.innerText = "Error starting render.";
      }
    } catch (e) { status.innerText = "Error: " + e.message; }
  }

  async function pollStatus(id) {
    const interval = setInterval(async () => {
      const res = await fetch(`/functions/poll?id=${id}`);
      const data = await res.json();
      
      if (data.status === 'done') {
        clearInterval(interval);
        videoUrl = data.url;
        document.getElementById('status').innerText = "✅ Done!";
        document.getElementById('exportBtn').style.display = 'block';
        document.getElementById('genBtn').disabled = false;
      } else if (data.status === 'failed') {
        clearInterval(interval);
        document.getElementById('status').innerText = "❌ Render Failed.";
      } else {
        document.getElementById('status').innerText = "Cooking video... (" + data.status + ")";
      }
    }, 5000);
  }

  function downloadVideo() {
    window.open(videoUrl, '_blank');
  }
</script>
</body>
</html>
