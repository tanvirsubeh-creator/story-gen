<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Generator</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;padding:40px;">

    <h1>🔥 Viral Story Generator</h1>

    <button id="genBtn" onclick="generateScript()">Generate Story</button>
    <p id="status">Idle</p>

    <h2 id="title"></h2>
    <p id="views" style="color: #aaa; font-weight: bold;"></p>
    <div id="body" style="max-width: 600px; margin: 20px auto; text-align: left; line-height: 1.6; white-space: pre-wrap;"></div>

<script>
async function generateScript() {
    const genBtn = document.getElementById('genBtn');
    const status = document.getElementById('status');
    const titleEl = document.getElementById('title');
    const viewsEl = document.getElementById('views');
    const bodyEl = document.getElementById('body');

    // Reset UI
    genBtn.disabled = true;
    status.innerText = 'Claude is writing...';
    titleEl.innerText = '';
    viewsEl.innerText = '';
    bodyEl.innerText = '';

    const prompt = `Return ONLY valid JSON. { "title": "...", "body": "...", "views": "..." } Make it a viral TikTok story. Body must be 300+ words.`;

    try {
        const res = await fetch("/.netlify/functions/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        // Safety Check: If the function or API returned an error
        if (!res.ok || data.error) {
            console.error("API Error:", data);
            status.innerText = 'Error: ' + (data.error || 'Check Console');
            genBtn.disabled = false;
            return; 
        }

        // Get the text from Anthropic's response structure
        const contentText = data.content[0].text;
        
        // Parse the JSON string provided by Claude
        const parsed = JSON.parse(contentText);

        // Update UI with results
        titleEl.innerText = parsed.title;
        viewsEl.innerText = "👁 " + parsed.views;
        bodyEl.innerText = parsed.body;

        status.innerText = 'Ready!';
    } catch (err) {
        console.error("System Error:", err);
        status.innerText = 'System Error: ' + err.message;
    }

    genBtn.disabled = false;
}
</script>

</body>
</html>
