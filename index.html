<body>

<video autoplay muted loop id="video-bg">
  <source src="https://assets.mixkit.co/videos/preview/mixkit-top-view-of-a-small-mountain-river-in-the-middle-of-a-forest-42211-large.mp4" type="video/mp4">
</video>

<div class="container">
  <h1>🎭 Story Gen</h1>

<button id="genBtn" onclick="generateStory()">GENERATE VIRAL STORY</button>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="status">Idle</p>

  <div id="storyCard">
    <div id="storyTitle"></div>
    <div id="views"></div>
    <div id="scriptPreview"></div>
  </div>

  <p id="renderStatus"></p>

<button id="exportBtn" onclick="downloadVideo()">⬇ EXPORT VIDEO</button>

</div>

<script>
  let finalVideoUrl = null;
  let pollInterval = null;
  let progress = 0;

  async function generateStory() {
    const btn = document.getElementById('genBtn');
    const status = document.getElementById('status');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const storyCard = document.getElementById('storyCard');
    const exportBtn = document.getElementById('exportBtn');
    const renderStatus = document.getElementById('renderStatus');

    btn.disabled = true;
    exportBtn.style.display = 'none';
    storyCard.style.display = 'none';
    renderStatus.style.display = 'none';
    finalVideoUrl = null;
    progress = 0;

    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';

    status.innerText = 'Writing your story...';
    animateProgress(15);

    try {
      const res = await fetch('/.netlify/functions/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: 'viral story' }),
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        status.innerText = 'Error: ' + (data.error || 'Unknown error');
        btn.disabled = false;
        return;
      }

      animateProgress(50);
      status.innerText = 'Generating voiceover...';

      document.getElementById('storyTitle').innerText = data.title || '';
      document.getElementById('views').innerText = '👁 ' + (data.views || '') + ' views';
      document.getElementById('scriptPreview').innerText = data.script || '';
      storyCard.style.display = 'block';

      animateProgress(75);
      status.innerText = 'Assembling your video... (this takes ~1-2 min)';

      renderStatus.style.display = 'block';
      renderStatus.innerText = '⏳ Video rendering in progress...';

      if (data.renderId) {
        pollForVideo(data.renderId);
      } else {
        status.innerText = 'Error: No render ID returned.';
        btn.disabled = false;
      }

    } catch (err) {
      status.innerText = 'Connection error: ' + err.message;
      btn.disabled = false;
    }
  }

  function animateProgress(target) {
    progress = target;
    document.getElementById('progressBar').style.width = target + '%';
  }

  function pollForVideo(renderId) {
    let attempts = 0;
    pollInterval = setInterval(async () => {
      attempts++;
      try {
        const res = await fetch(`/.netlify/functions/poll?id=${renderId}`);
        const data = await res.json();

        if (data.status === 'done' && data.url) {
          clearInterval(pollInterval);
          finalVideoUrl = data.url;
          animateProgress(100);
          document.getElementById('status').innerText = '✅ Video ready!';
          document.getElementById('renderStatus').innerText = '🎬 Your video is ready to export!';
          document.getElementById('exportBtn').style.display = 'block';
          document.getElementById('genBtn').disabled = false;
        } else if (data.status === 'failed') {
          clearInterval(pollInterval);
          document.getElementById('status').innerText = '❌ Render failed. Try again.';
          document.getElementById('renderStatus').style.display = 'none';
          document.getElementById('genBtn').disabled = false;
        } else {
          document.getElementById('renderStatus').innerText =
            `⏳ Still rendering... (${attempts * 5}s elapsed)`;
        }
      } catch (e) {
        // keep polling
      }

      if (attempts > 60) {
        clearInterval(pollInterval);
        document.getElementById('status').innerText = 'Render timed out. Try again.';
        document.getElementById('genBtn').disabled = false;
      }
    }, 5000);
  }

  function downloadVideo() {
    if (!finalVideoUrl) return;
    const a = document.createElement('a');
    a.href = finalVideoUrl;
    a.download = 'viral-story.mp4';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
</script>

</body>
</html>
